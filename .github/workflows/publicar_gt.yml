name: VITE MPA Publicar a Github Pages

on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
env:
  DEPLOY_BASE_URL: ${{ vars.DEPLOY_BASE_URL }}
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Me-portafolio
    steps:
      - name: Clonar el Repositorio
        uses: actions/checkout@v4

      - name: Instalar Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Instalar Dependencias del Proyecto
        run: npm install

      - name: Compilar el Proyecto en Dist
        run: npm run build

      - name: Configurar Github Pages para Publicar
        uses: actions/configure-pages@v5

      - name: Subir los compilados (DIST)
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.Portafolio/Me-portafolio/dist'

      - name: Publicar Artefactos
        id: deployment
        uses: actions/deploy-pages@v4